name: Scrape sbox.game/learn

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache camoufox browser
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: backend/camoufox_build
          key: camoufox-patched-v146.0.1-beta.25-v5

      - name: Download camoufox browser
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: |
          cd backend
          curl -L -o camoufox.zip "https://github.com/coffeegrind123/camoufox-beta/releases/download/v146.0.1-beta.25-patched/camoufox-146.0.1-beta.25-lin.x86_64.zip"
          unzip camoufox.zip -d camoufox_build
          rm camoufox.zip
          chmod +x camoufox_build/camoufox-bin

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libx11-xcb1 libasound2t64 libdbus-glib-1-2 libxt6

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      # Node + @stackone/defender drive the prompt-injection scanner that
      # filters tutorial bodies before they land in docs/. Without this
      # step the scrape still works but no scanning happens (the bridge
      # logs a warning and the manifest's defender.active is false),
      # which we treat as a CI failure further down by checking the
      # manifest after the scrape.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install defender (Node)
        working-directory: backend
        run: npm install --omit=dev --no-audit --no-fund

      - name: Link camoufox binary to pip cache
        run: |
          CACHE_DIR=$(python -c "from platformdirs import user_cache_dir; print(user_cache_dir('camoufox'))")
          rm -rf "$CACHE_DIR"
          ln -s "$(pwd)/backend/camoufox_build" "$CACHE_DIR"

      - name: Run scraper
        working-directory: backend/src
        run: python scrape.py 2>&1 | tail -200
        timeout-minutes: 15

      # Hard guard: fail the build if the manifest shows the defender
      # bridge was NOT active. Catches a regression where Node setup or
      # `npm install` quietly failed and the scrape proceeded unscanned.
      - name: Verify defender ran
        run: |
          python3 - <<'PY'
          import json, sys
          mf = json.load(open("docs/_manifest.json"))
          d = mf.get("defender", {})
          if not d.get("active"):
              print("::error::defender did not run for this scrape — manifest defender.active is false")
              print("Check the 'Run scraper' step above for the bridge-startup warning.")
              sys.exit(1)
          print(f"defender ok: scanned={d['scanned']} passed={d['passed']} blocked={len(d.get('blocked', []))}")
          PY

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          git diff --staged --quiet || git commit -m "Update sbox.game/learn mirror $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

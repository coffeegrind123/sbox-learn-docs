name: Scrape sbox.game/learn

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache camoufox browser
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: backend/camoufox_build
          key: camoufox-patched-v146.0.1-beta.25-v5

      - name: Download camoufox browser
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: |
          cd backend
          curl -L -o camoufox.zip "https://github.com/coffeegrind123/camoufox-beta/releases/download/v146.0.1-beta.25-patched/camoufox-146.0.1-beta.25-lin.x86_64.zip"
          unzip camoufox.zip -d camoufox_build
          rm camoufox.zip
          chmod +x camoufox_build/camoufox-bin

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libx11-xcb1 libasound2t64 libdbus-glib-1-2 libxt6

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Link camoufox binary to pip cache
        run: |
          CACHE_DIR=$(python -c "from platformdirs import user_cache_dir; print(user_cache_dir('camoufox'))")
          rm -rf "$CACHE_DIR"
          ln -s "$(pwd)/backend/camoufox_build" "$CACHE_DIR"

      - name: Run scraper
        working-directory: backend/src
        run: python scrape.py 2>&1 | tail -200
        timeout-minutes: 15

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          git diff --staged --quiet || git commit -m "Update sbox.game/learn mirror $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
